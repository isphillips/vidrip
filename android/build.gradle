buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// ── 16 KB page-size support (Google Play requirement for Android 15+) ────────────────
// NDK r27 does NOT 16 KB-align native libs by default — each module's CMake build must opt
// in via ANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON. React Native's own libs and some modules
// (worklets-core, gesture-handler) already pass it, but standalone-CMake modules (reanimated,
// screens, skia) don't, so their .so ship 4 KB-aligned and Play rejects the upload. Inject the
// flag into every Android subproject so all native libs relink 16 KB-aligned.
// (Can be removed once the project moves to NDK r28+, where 16 KB is the default.)
subprojects { subproject ->
    ["com.android.library", "com.android.application"].each { pluginId ->
        subproject.plugins.withId(pluginId) {
            subproject.android {
                defaultConfig {
                    externalNativeBuild {
                        cmake {
                            arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
                        }
                    }
                }
            }
        }
    }
}
