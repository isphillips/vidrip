# B9 — Long-press a group row → rename modal → Save / Reset to default.
# NEEDS-DEVICE: long-press is a press-and-hold gesture; reliable on a device, flaky in headless.
# Requires: P7 seed (account A is in a group chat that surfaces on Feed — i.e. it has unread).
# NOTE: Feed uses a PLAINER centered fade modal ("Rename group" / input "Group name" / "Save" /
# "Reset to default"). The BRANDED slide-up sheet ("Save name" / "Reset to default name") lives in
# MessagesHomeScreen — see D8/B9 in E2E_AUDIT (D-8). This case asserts the Feed modal copy.
appId: ${APP_ID}
tags:
  - suite-B
  - needs-device
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Feed"
- assertVisible:
    id: "tab-Feed"
    timeout: 15000

# The group row only appears on Feed while it has unread; it's titled by the group name.
- assertVisible:
    text: "${SEED_GROUP_CHAT_NAME}"
    timeout: 15000

# ── NEEDS-DEVICE: long-press gesture ─────────────────────────────────────────
# Press-and-hold the group row to open the rename modal. longPressOn is reliable on a device.
- longPressOn:
    text: "${SEED_GROUP_CHAT_NAME}"
# Feed rename modal copy (plain centered fade modal):
- assertVisible: "Rename group"
- assertVisible:
    text: "Reset to default"
- assertVisible: "Save"
# Dismiss without changing the name (tap Save keeps the current draft; or tap the overlay).
# Avoid mutating seeded data — just confirm the modal mounted, then close it.
# - tapOn: "Reset to default"   # would revert to auto name — destructive to seed; leave commented
- tapOn:
    point: "50%,5%"             # tap the dimmed overlay to dismiss without saving
- assertVisible:
    id: "tab-Feed"
#
# Unblocks: device long-press. The Save/Reset round-trip is then assertable (re-open + verify
# the new/auto name), but only against a throwaway group so seeded data isn't mutated.
