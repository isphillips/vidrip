# B1 — Feed shows only UNSEEN actionable rows; caught-up convs live in Messages.
# Requires: P7 seed (account A has ≥1 friend/channel with an UNREACTED video pending, AND
# ≥1 already-caught-up conversation). Without seed this still runs but can't prove the split.
appId: ${APP_ID}
tags:
  - suite-B
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Feed"
- assertVisible:
    id: "tab-Feed"
    timeout: 15000

# Feed is actionable-only: an UNREACTED share from friend B should surface here.
- assertVisible:
    text: ".*${TEST_HANDLE_B}.*"
    timeout: 15000

# Cross-check: the SAME caught-up conversations appear in Messages (the full list), so a
# conversation that is caught-up shows in Messages but NOT in Feed. Open Messages and confirm
# the conversation home renders (header "Messages" is unique to this screen; tab labels are not).
- tapOn:
    id: "tab-Messages"
- assertVisible: "Messages"
# NOTE: a precise "caught-up row visible in Messages but absent from Feed" assertion needs a
# named seed fixture (a specific caught-up friend handle). Add TEST_HANDLE_* + assertNotVisible
# in Feed for that friend once the seed defines one.
