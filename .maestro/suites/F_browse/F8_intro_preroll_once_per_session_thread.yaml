# F8 — A thread's intro pre-roll plays once per session per thread before the reaction recorder.
# Requires: P7 — a pending friend-share from B that HAS an intro attached (sender recorded an intro
#           when sharing; see F2 / ShareHome intro). Real device for the recorder behind it.
appId: ${APP_ID}
tags:
  - suite-F
  - needs-device
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Feed"
- assertVisible:
    text: ".*${TEST_HANDLE_B}.*"
    timeout: 15000
- tapOn:
    text: ".*${TEST_HANDLE_B}.*"

# ── NEEDS-DEVICE from here ───────────────────────────────────────────────────
# When the tapped share has an intro, an IntroPreroll plays full-screen BEFORE the recorder mounts.
# The introSeenStore (shared, survives navigation.replace) records the thread as seen, so the
# pre-roll plays ONCE PER SESSION PER THREAD — re-entering the same thread this session skips it and
# goes straight to the recorder; it gates 3 entry points (E2E_AUDIT F8).
#
# The pre-roll is a bare full-screen video (no chrome text to assert verbatim). Verify on device:
#   1. First open of B's intro-bearing thread → the intro plays, then the recorder.
#   2. Back out, re-open the SAME thread in the same session → intro is skipped, recorder opens directly.
# Behind it the recorder is the same surface as F3 (source plays → camera records).
