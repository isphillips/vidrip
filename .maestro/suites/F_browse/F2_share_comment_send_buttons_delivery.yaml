# F2 — Player has Studio-styled comment + send buttons; send opens a friend picker → delivered.
# Requires: P7 (friend B in A's friends list).
# BLOCKED:P2 — delivery (sendThread → recipient receives) needs the share backend.
appId: ${APP_ID}
tags:
  - suite-F
  - needs-seed
  - blocked-p2
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Share"
- assertVisible: "Browse ✵ Share"

# Open the first grid tile → full-screen player overlay (tiles have no testID).
- tapOn:
    point: "27%,42%"

# The player's bottom action row has two GradientIcon (Studio-styled) buttons:
#   - chatbubbles  → opens the comments sheet (VideoCommentsSheet)  → testID "share-comments"
#   - paper-plane  → opens the share drawer (friend picker)         → testID "share-send"
- assertVisible:
    id: "share-comments"
# Open the share drawer via the paper-plane action button:
- tapOn:
    id: "share-send"

# The share drawer's title is "Send to…"; it lists friends with a filter field.
- assertVisible: "Send to…"
# Pick friend B. Friend rows have testID "share-friend-<userId>"; since the flow knows B by
# handle (not user id), match the row by its @handle text.
- tapOn: ".*${TEST_HANDLE_B}.*"
# The Send button text reflects the selection: "Send to 1 friend" (else "Select friends to send").
- assertVisible: "Send to 1 friend"
- tapOn:
    id: "share-drawer-send"
#
# ── BLOCKED:P2 ───────────────────────────────────────────────────────────────
# Pressing Send runs sendThread (creates the thread + notifies B) — the delivery backend.
# On success a toast shows on the player: exact "Sent to 1 friend!" (plural "friends" for N>1).
# - assertVisible: "Sent to 1 friend!"
# Confirming B actually receives it surfaces in B's Feed (see SM4) — out of band here.
