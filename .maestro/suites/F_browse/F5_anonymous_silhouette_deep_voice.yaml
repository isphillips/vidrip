# F5 — Anonymous mode: forces a silhouette lens + deep voice, baked into the saved file before upload.
# Requires: real device (camera + native voice bake). NEEDS-DEVICE.
# BLOCKED:P2 — anonymous mode is gated by users.react_anonymously; the toggle must be set server-side
#              for account A before the recorder enters anonymous mode.
appId: ${APP_ID}
tags:
  - suite-F
  - needs-device
  - needs-seed
  - blocked-p2
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Feed"
- assertVisible:
    text: ".*${TEST_HANDLE_B}.*"
    timeout: 15000
- tapOn:
    text: ".*${TEST_HANDLE_B}.*"

# ── NEEDS-DEVICE + BLOCKED:P2 from here ──────────────────────────────────────
# When users.react_anonymously is true (useAnonymousMode), the recorder:
#   - hides the lens picker and FORCES the silhouette lens (ANON_LENS_KEY), and
#   - shows an anonymous status badge instead of the picker. Exact badge text (ReactionRecorder):
#       "🕶  Anonymous"   (note: TWO spaces between the emoji and the word, verbatim)
#   - on save, bakes the silhouette + deep voice (ANON_VOICE_MOD) INTO the file via the background
#     baker BEFORE upload, so the raw face/voice never leave the device; a "Preparing video…" toast
#     shows during the bake, then the normal save toast.
#
# With the flag seeded on, on device:
# - assertVisible: "🕶  Anonymous"
# Then record/stop:
# - tapOn: { id: "recorder-record" }
# - ... wait ...
# - tapOn: { id: "recorder-stop" }
# Confirm the saved/uploaded reaction shows the silhouette + pitched voice (the obscuring is in the
# baked pixels/audio — verify by playing the saved reaction back).
#
# Without the users.react_anonymously flag the recorder runs NORMALLY (no anon badge) — hence BLOCKED:P2.
