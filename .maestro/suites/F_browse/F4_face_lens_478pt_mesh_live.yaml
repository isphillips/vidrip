# F4 — Face lens renders live from a 478-point MediaPipe mesh during a reaction.
# Requires: real device — the live mesh is a native MediaPipe plugin (faceTracking.ts); the iOS
# Simulator has no tracker (it seeds a MOCK_FACE only). NEEDS-DEVICE.
appId: ${APP_ID}
tags:
  - suite-F
  - needs-device
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Feed"
- assertVisible:
    text: ".*${TEST_HANDLE_B}.*"
    timeout: 15000
- tapOn:
    text: ".*${TEST_HANDLE_B}.*"

# ── NEEDS-DEVICE from here ───────────────────────────────────────────────────
# In the recorder, the lens picker pill sits TOP CENTER (LensPicker, shared with Studio Capture).
# Its panel tabs are "Mask" / "Warp" / "Overlay" / "Interactive"; picking a mesh lens (a Mask-tab
# lens whose def has `mesh: true`) requests the full 478-point landmark mesh from useFaceTracking
# (faceTracking.ts) and renders it live over the front-camera PIP via LiveFaceLens.
#
# On device:
# - tapOn: "None"            # the lens pill (label = active lens; "None" until picked)
# - tapOn: "Mask"            # mesh-lens category
#   (then pick a mesh lens tile — labels are data-driven from LENSES, no fixed string)
# Confirm the lens tracks the face in real time (visual only — no DOM text to assert).
# faceTrackingAvailable is false on the simulator, so this MUST be a physical device.
