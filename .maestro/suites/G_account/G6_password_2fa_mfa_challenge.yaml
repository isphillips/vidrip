# G6 — Set a password + enable 2FA → an MFA challenge is required on the next sign-in.
# BLOCKED:P1 — completing 2FA enrollment needs an authenticator app + a live TOTP code, and the
#              MFA challenge appears on a fresh sign-in (re-auth). Automate reaching the
#              "Password Login" and "Two-Factor Auth" screens; annotate the challenge as P1.
appId: ${APP_ID}
tags:
  - suite-G
  - needs-device
  - blocked-p1
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }

- tapOn:
    id: "tab-Feed"
- tapOn:
    id: "nav-account-blob"
- assertVisible: "Account"

# Reach the Password Login screen (sets/updates the account password).
- tapOn: "Password Login"
- assertVisible: "Password Login"          # navigator header title
- assertVisible: "New Password"
- assertVisible: "Confirm Password"
# (Filling + "Save Password" calls supabase.auth.updateUser — left un-run so we don't change
#  the seeded account's credentials. That write is backend-side; see tail.)
- back

# Reach the Two-Factor Auth screen via Account → Advanced → Two-Factor Authentication.
- assertVisible: "Account"
- tapOn: "Advanced"
- assertVisible: "Advanced"                # navigator header title
- assertVisible: "Security"
- tapOn: "Two-Factor Authentication"
- assertVisible: "Two-Factor Auth"         # navigator header title
- assertVisible: "Set up authenticator"

# ── BLOCKED:P1 — enroll TOTP + verify the next-sign-in challenge ──────────────
# Tapping "Set up authenticator" enrolls a TOTP factor and shows a secret key + a 6-digit
# code field ("Confirm & enable"). Completing it needs a real authenticator app to generate
# the live code — Maestro has no TOTP source. Once enabled, the MFA challenge surfaces only on a
# FRESH sign-in (sign out → sign in → enter 6-digit code), which also requires the live code.
# UNBLOCKS WHEN (P1): a deterministic TOTP secret/code is injected for the test account so the
# enroll-verify step and the subsequent sign-in challenge can be completed and asserted.
- assertVisible: "Two-Factor Auth"
