# G4 — Edit profile: handle/avatar/bio save everywhere. (Plan expected an editable handle.)
# NOTE: GAP — the handle is READ-ONLY on Edit Profile (rendered as a disabled "@handle" field).
#             Name, bio, location, and avatar ARE editable. Automate opening Edit Profile and
#             assert the handle is read-only; the avatar pick + save round-trip is annotated below.
appId: ${APP_ID}
tags:
  - suite-G
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }

- tapOn:
    id: "tab-Feed"
- tapOn:
    id: "nav-account-blob"
- assertVisible: "Account"

# Open Edit Profile (the "Edit profile" link under the avatar, or tapping the avatar).
- tapOn: "Edit profile"
- assertVisible: "Edit Profile"        # navigator header title

# Editable fields are present.
- assertVisible: "Display name"
- assertVisible: "Bio"
- assertVisible: "Location"
- assertVisible: "Change photo"        # avatar picker entry point

# Handle is READ-ONLY: it shows as "@<handle>" inside a disabled field with NO TextInput.
# Assert the seeded handle is displayed; it cannot be edited.
- assertVisible: ${TEST_HANDLE_A}

# Exercise an editable field (bio) to prove the form works + Save enables when dirty.
- tapOn: "Tell people about yourself"  # Bio placeholder
- inputText: "E2E bio edit"
- hideKeyboard
- assertVisible: "Save"

# ── Partial / device tail ────────────────────────────────────────────────────
# Tapping "Save" persists name/bio/location/avatar (updateProfile) and pops back to Account,
# where the new bio shows under the avatar — this part IS automatable, but is left un-tapped here
# so the run does not mutate the seeded test profile. Avatar change additionally opens the OS photo
# picker + AvatarCropper (needs-device, can't be driven headlessly).
# To verify persistence "everywhere" end-to-end, run on a device:
#   - tapOn "Save"  → assertVisible "Account"  → assertVisible "E2E bio edit"
- assertVisible: "Edit Profile"
