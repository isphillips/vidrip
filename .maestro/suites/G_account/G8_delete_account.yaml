# G8 — Delete account → schedules a 30-day grace deletion (cancellable).
# BLOCKED:P2 — confirming deletion needs either a live TOTP code + password (2FA accounts) or an
#              emailed OTP (non-2FA), and it mutates the backend. Automate reaching "Advanced" and
#              the delete entry point ONLY; DO NOT actually delete the test account.
appId: ${APP_ID}
tags:
  - suite-G
  - blocked-p2
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }

- tapOn:
    id: "tab-Feed"
- tapOn:
    id: "nav-account-blob"
- assertVisible: "Account"

# Reach the Advanced screen (hosts the Danger Zone / delete flow).
- tapOn: "Advanced"
- assertVisible: "Advanced"              # navigator header title
- assertVisible: "Danger Zone"
- assertVisible: "Delete my account"

# Open the confirm dialog but CANCEL — never actually delete the seeded test account.
- tapOn: "Delete my account"
# Alert.alert('Delete account?', '... permanently deletes ... after a 30-day grace period.', [Cancel, Continue])
- assertVisible: "Delete account?"
- tapOn: "Cancel"

# ── BLOCKED:P2 — the actual deletion ─────────────────────────────────────────
# Tapping "Continue" expands the confirm UI:
#   * 2FA accounts: enter a 6-digit authenticator code + password → "Permanently delete".
#   * non-2FA accounts: "Email me a code" → enter the emailed 6-digit OTP → "Permanently delete".
# On success: Alert 'Deletion scheduled' — synced accounts disconnected + account purged in 30 days,
# cancellable via "Keep my account". Completing this needs a live TOTP/OTP and WILL schedule a real
# deletion, so it is intentionally NOT executed here.
# UNBLOCKS WHEN (P2): a disposable throwaway test account + a deterministic OTP/TOTP source, run in
# isolation, asserting "Deletion scheduled" then "Keep my account" to roll it back.
- assertVisible: "Advanced"
