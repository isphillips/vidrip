# E5 — Overlays step: text/stickers/emoji/animated/effects composite over the clip.
# Requires: real device — the Overlays screen needs trimmed + look-applied footage to composite onto.
appId: ${APP_ID}
tags:
  - suite-E
  - needs-device
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Studio"
- assertVisible: "New video"
- tapOn: "New video"

# ── NEEDS-DEVICE from here ───────────────────────────────────────────────────
# Capture → Trim → Next → Looks → Next → Music (Audio) → Next → Overlays (StudioOverlayScreen,
# header "Overlays").
#
# The Overlays tray has a 5-tab bar. Verified labels (StudioOverlayScreen tabBar):
#   "Text", "Stickers", "Emoji", "Animated", "Effects".
# (Spec called the last tab "overlays"; the SHIPPED label is "Effects".)
#
# On device:
# - assertVisible: "Overlays"   # screen header
# - assertVisible: "Text"
# - assertVisible: "Stickers"
# - assertVisible: "Emoji"
# - assertVisible: "Animated"
# - assertVisible: "Effects"
#
# Add a text overlay (composites a draggable text node onto the preview):
# - tapOn: "Text"
# - tapOn: "Add Text"          # opens an Alert.prompt; typing + confirm adds the node (prompt is OS-native)
#
# Tapping "Next" bakes the look+music and replays the overlay recipe live; a "Processing video"
# overlay appears during the bake:
# - tapOn: "Next"
# - assertVisible: "Processing video"
