# D4 — Friends menu → "Import from contacts" → invite codes generated; no phone numbers stored.
# NEEDS-DEVICE: requires the OS contacts permission prompt + reading the address book (and SMS to
# actually invite). Headless emulators have no contacts and can't grant the permission reliably.
appId: ${APP_ID}
tags:
  - suite-D
  - needs-device
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Messages"
- assertVisible: "Messages"

- tapOn:
    id: "nav-friends-blob"

# Reachable: tap the menu item → navigates to the InviteContacts screen.
- tapOn: "Import from contacts"

# ── NEEDS-DEVICE from here ───────────────────────────────────────────────────
# On a real device with contacts + permission granted:
#   1. The screen requests the OS contacts permission; grant it.
#   2. Contacts list renders; selecting one generates an invite code / SMS invite.
#   3. PRIVACY: confirm no raw phone number is persisted server-side (invite is code-based).
# Maestro can't seed the address book or assert what is/isn't stored in the backend.
# TODO(testID): the InviteContacts screen + its permission CTA have no testIDs / verified copy —
# confirm on-device strings before adding asserts here.
#
# Unblocks: real device with seeded contacts; a known on-screen string to assert the screen
# mounted; and a backend check that invites are code-only (no phone stored).
- assertVisible:
    id: "tab-Messages"
    timeout: 25000
