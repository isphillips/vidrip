# D6 — Creating a group with the same member set (any order) DEDUPES to one chat.
# BLOCKED:P2 — dedupe lives in the server RPC create_group_chat (not in local migrations).
# Client only guards double-taps; retry-after-error/order-independent dedupe is server-side.
# See E2E_AUDIT D6 / SM8 (channels.ts:479-484 rpc).
# Requires: P7 seed (A friends with B and C).
appId: ${APP_ID}
tags:
  - suite-D
  - needs-seed
  - blocked-p2
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Messages"
- assertVisible: "Messages"

# Reachable: build a group once (same flow as D5). The DEDUPE assertion is gated on P2.
- tapOn:
    id: "nav-friends-blob"
- tapOn: "New group chat"
- assertVisible: "New Group Chat"
- tapOn:
    text: ".*${TEST_HANDLE_B}.*"
- tapOn:
    text: ".*${TEST_HANDLE_C}.*"
- tapOn: "Create"
- assertNotVisible: "New Group Chat"

# ── BLOCKED:P2 ───────────────────────────────────────────────────────────────
# Repeat with the SAME members in a DIFFERENT pick order ({C,B} not {B,C}) and confirm it OPENS
# THE SAME chat rather than creating a second one. This requires create_group_chat to canonicalise
# the member set server-side. Verify by group count in Messages (no second identical-member row).
# - tapOn: { id: "nav-friends-blob" }
# - tapOn: "New group chat"
# - tapOn: { text: ".*${TEST_HANDLE_C}.*" }
# - tapOn: { text: ".*${TEST_HANDLE_B}.*" }
# - tapOn: "Create"
# - assertNotVisible: "New Group Chat"   # then assert exactly one group with this member set
#
# Unblocks: deploy create_group_chat with order-independent dedupe.
- assertVisible:
    id: "tab-Messages"
    timeout: 25000
