# SM2 — Bottom nav: Feed · Channels · Studio(FAB) · Messages · Browse each loads, no crash.
# This is primarily a CRASH/REACHABILITY check: if any tab tears down the app, the flow errors.
# Tighter per-screen identity assertions live in the suite flows (they depend on P7 seed data).
appId: ${APP_ID}
tags:
  - smoke
---
- launchApp
# If launched fresh (not chained after SM1), sign in first.
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- assertVisible:
    id: "tab-Feed"

- tapOn:
    id: "tab-Channels"
- assertVisible:
    id: "nav-account-blob"   # Channels header mounted (no crash)

- tapOn:
    id: "tab-Messages"
- assertVisible:
    id: "nav-account-blob"   # Messages header mounted

- tapOn:
    id: "tab-Share"
- assertVisible: "Browse ✵ Share"   # Browse header is unique copy

- tapOn:
    id: "tab-Studio"
- assertVisible: "New video"          # StudioHome's CTA — unique to Studio

- tapOn:
    id: "tab-Feed"
- assertVisible:
    id: "tab-Feed"
