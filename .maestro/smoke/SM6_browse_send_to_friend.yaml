# SM6 — Browse a shorts feed and send one to a friend → friend (B) receives it.
#
# Requires: P7 (friend B). The grid tiles + share drawer have no testIDs yet, so the
# tile/drawer taps are point-based / text-based best-effort — verify selectors on device.
# "Received" = a pending thread_member row for B, which surfaces in B's Feed (SM4).
appId: ${APP_ID}
tags:
  - smoke
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Share"
- assertVisible: "Browse ✵ Share"

# Open the first video tile (grid is 2-col; tiles have no testID — tap top-left card).
- tapOn:
    point: "25%,40%"

# In the player, open the share drawer (paper-plane send icon, bottom of the player).
# Then pick friend B and Send. These controls need testIDs for a robust flow (catalogued).
# - tapOn: { id: "share-send" }        # TODO(testID): GradientIcon paper-plane
# - tapOn: ".*${TEST_HANDLE_B}.*"
# - tapOn: "Send"
# - assertVisible: "Sent to 1 friend!"   # toast (ShareHomeScreen)

# Until those testIDs exist, this flow is a MANUAL-assisted smoke: drive the player open,
# then a human completes the send and confirms B receives it in B's Feed.
