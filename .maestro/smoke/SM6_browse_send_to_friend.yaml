# SM6 — Browse a shorts feed and send one to a friend → friend (B) receives it.
#
# Requires: P7 (friend B). The grid tiles + share drawer have no testIDs yet, so the
# tile/drawer taps are point-based / text-based best-effort — verify selectors on device.
# "Received" = a pending thread_member row for B, which surfaces in B's Feed (SM4).
appId: ${APP_ID}
tags:
  - smoke
  - needs-seed
---
- launchApp
- runFlow:
    when:
      visible:
        id: "welcome-signin-link"
    commands:
      - runFlow:
          file: ../helpers/signIn.yaml
          env: { EMAIL: ${TEST_EMAIL_A}, PASSWORD: ${TEST_PASSWORD_A} }
- tapOn:
    id: "tab-Share"
- assertVisible: "Browse ✵ Share"

# Open the first video tile (grid is 2-col; tiles have no testID — tap top-left card).
- tapOn:
    point: "25%,40%"

# In the player, open the share drawer (paper-plane send icon, bottom of the player).
- assertVisible:
    id: "share-send"
- tapOn:
    id: "share-send"
- assertVisible: "Send to…"
# Pick friend B (row testID is "share-friend-<userId>"; match by @handle since the flow
# knows B by handle, not user id), then tap the drawer Send button.
- tapOn: ".*${TEST_HANDLE_B}.*"
- tapOn:
    id: "share-drawer-send"
# - assertVisible: "Sent to 1 friend!"   # toast (ShareHomeScreen) — needs the delivery backend

# The send (sendThread → B receives) still depends on the share backend, so confirming B
# actually receives it in B's Feed remains a MANUAL-assisted step until that's live.
