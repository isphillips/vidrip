name: iOS OTA

# Roll out a Hot Updater over-the-air JS (React Native) bundle to iOS testers when
# React/JS source changes land on main. The native gate is iOS-specific: only
# ios/ + dependency (package.json / yarn.lock) changes block the OTA — those need a
# fresh build to TestFlight/App Store, and OTAing JS that depends on un-shipped native
# code would crash older installs. android-only native changes do NOT block the iOS OTA.
on:
  push:
    branches: [main]

concurrency:
  group: ios-ota
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: cls
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            before="${{ github.sha }}^"
          fi
          files="$(git diff --name-only "$before" "${{ github.sha }}")"
          echo "Changed files:"; echo "$files"
          native=false; js=false
          # iOS-specific native gate (android/ is intentionally excluded — it can't affect the iOS binary).
          echo "$files" | grep -qE '^(ios/|package\.json|yarn\.lock)' && native=true
          echo "$files" | grep -qE '^(src/|assets/|App\.tsx|index\.js|app\.json|babel\.config\.js|metro\.config\.js)' && js=true
          echo "native=$native" >> "$GITHUB_OUTPUT"
          echo "js=$js" >> "$GITHUB_OUTPUT"

      - name: Skip (no JS-only change)
        if: steps.cls.outputs.native == 'true' || steps.cls.outputs.js == 'false'
        run: echo "Native/dependency change (needs a TestFlight build) or no JS touched — skipping OTA."

      - name: Set up Node
        if: steps.cls.outputs.native == 'false' && steps.cls.outputs.js == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 3)
        if: steps.cls.outputs.native == 'false' && steps.cls.outputs.js == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.cls.outputs.native == 'false' && steps.cls.outputs.js == 'true'
        run: yarn install --immutable

      - name: Read app version
        id: ver
        if: steps.cls.outputs.native == 'false' && steps.cls.outputs.js == 'true'
        run: echo "value=$(grep -m1 -oP 'MARKETING_VERSION = \K[^;]+' ios/Vidrip.xcodeproj/project.pbxproj)" >> "$GITHUB_OUTPUT"

      - name: Deploy iOS OTA
        if: steps.cls.outputs.native == 'false' && steps.cls.outputs.js == 'true'
        env:
          # Supabase: bundle metadata + update-check server (database plugin).
          HOT_UPDATER_SUPABASE_URL: ${{ secrets.HOT_UPDATER_SUPABASE_URL }}
          HOT_UPDATER_SUPABASE_ANON_KEY: ${{ secrets.HOT_UPDATER_SUPABASE_ANON_KEY }}
          HOT_UPDATER_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.HOT_UPDATER_SUPABASE_SERVICE_ROLE_KEY }}
          # Tigris: bundle files (S3-compatible storage plugin — see hot-updater-tigris.ts).
          HOT_UPDATER_S3_ENDPOINT: ${{ secrets.HOT_UPDATER_S3_ENDPOINT }}
          HOT_UPDATER_S3_REGION: ${{ secrets.HOT_UPDATER_S3_REGION }}
          HOT_UPDATER_S3_ACCESS_KEY_ID: ${{ secrets.HOT_UPDATER_S3_ACCESS_KEY_ID }}
          HOT_UPDATER_S3_SECRET_ACCESS_KEY: ${{ secrets.HOT_UPDATER_S3_SECRET_ACCESS_KEY }}
          HOT_UPDATER_S3_BUCKET_NAME: ${{ secrets.HOT_UPDATER_S3_BUCKET_NAME }}
          HOT_UPDATER_S3_PUBLIC_URL: ${{ secrets.HOT_UPDATER_S3_PUBLIC_URL }}
        run: npx hot-updater deploy -p ios -t "${{ steps.ver.outputs.value }}" -m "$(git log -1 --pretty=%s)" -f
